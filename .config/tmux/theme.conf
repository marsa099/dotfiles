# Tmux theme
# Generated from centralized theme system

# Status bar
set -g status-style "bg=#1B1B1B,fg=#EDEDED"

# Status left: session name (green, red on prefix)
set -g status-left "#[fg=#97B5A6,bold]#{?client_prefix,#[fg=#FF7B72],} #S "
set -g status-right "#[fg=#CCD5E4]%H:%M"

# Window tabs
set -g window-status-style "fg=#707B84"
set -g window-status-format " #I:#W "
set -g window-status-current-style "fg=#CCD5E4,bold"
set -g window-status-current-format " #I:#W "
set -g window-status-activity-style "fg=#ff8a31,none"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#707B84"
set -g pane-active-border-style "fg=#CCD5E4"

# Messages
set -g message-style "fg=#8A9AA6,bg=#292826"
set -g message-command-style "fg=#8A9AA6,bg=#292826"

# Copy mode
set -g mode-style "bg=#282F38,bold"

# Clock
set -g clock-mode-colour "#CCD5E4"

# Popups (tmux 3.4+)
set -gq popup-style "bg=#181818"
set -gq popup-border-style "fg=#707B84"
