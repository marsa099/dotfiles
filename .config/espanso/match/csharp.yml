# C# / .NET keywords - auto-wrap in backticks
# Only includes terms that are unambiguously code (no common English words)

matches:
  # --- Exception types ---
  - trigger: "Exception"
    replace: "`Exception`"
    word: true
  - trigger: "NullReferenceException"
    replace: "`NullReferenceException`"
    word: true
  - trigger: "ArgumentException"
    replace: "`ArgumentException`"
    word: true
  - trigger: "ArgumentNullException"
    replace: "`ArgumentNullException`"
    word: true
