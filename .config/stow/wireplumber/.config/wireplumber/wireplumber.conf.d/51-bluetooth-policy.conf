## Bluetooth profile policy overrides.
## Without persistent-storage, every connect starts with the default profile
## policy (A2DP for audio sinks). This avoids AirPods being stuck in HFP
## across reconnects after a one-off call. autoswitch-to-headset-profile is
## still true so the system temporarily swaps to HFP while an app captures
## the mic, then returns to A2DP.

wireplumber.settings = {
  bluetooth.use-persistent-storage     = false
  bluetooth.autoswitch-to-headset-profile = true
}
